# Local dev stack: Redis + FastAPI (uvicorn --reload) + two Celery workers
# (steg + analysis queues). Code is bind-mounted; deps install once into the
# persisted core_venv volume. Run:  docker compose -f docker/dev.yml up
#
# Only the `core` service installs Python deps — three containers pip-installing
# into the same venv volume concurrently can corrupt it. core touches
# /opt/venv/.ready when done; the workers wait for that sentinel before starting.
#
# Explicit project name: without it compose derives the name from this file's
# directory ("docker") and collides with veil-web's dev stack.
name: veil-core

volumes:
  core_venv:

x-core: &core
  build:
    context: dockerfiles
    dockerfile: be.Dockerfile
  image: veil-core-dev
  env_file:
    - secret-envs/veil-core.env
    - envs/core-dev.env
  # Docker-specific overrides of the localhost dev wiring (take precedence over
  # env_file): reach redis by service name, the host's web app, and the mounted
  # weights volume.
  environment:
    PYTHONPATH: /app
    REDIS_URL: redis://redis:6379/0
    WEB_CALLBACK_URL: http://host.docker.internal:3000
    WEIGHTS_DIR: /app/weights
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ..:/app
    - core_venv:/opt/venv
  depends_on:
    - redis

services:
  core:
    <<: *core
    container_name: veil-core
    # The venv guard checks that pip actually IMPORTS (not just that python
    # exists): an interrupted first boot leaves a half-built venv, which
    # `venv --clear` then rebuilds from scratch.
    command: >
      bash -lc "/opt/venv/bin/python -m pip --version >/dev/null 2>&1 || python -m venv --clear /opt/venv;
      /opt/venv/bin/pip install -q -r requirements.txt &&
      /opt/venv/bin/pip install -q torch torchvision --index-url https://download.pytorch.org/whl/cpu &&
      touch /opt/venv/.ready &&
      /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - 8000:8000

  steg_worker:
    <<: *core
    container_name: veil-core-steg-worker
    depends_on:
      - redis
      - core
    command: >
      bash -lc "echo 'waiting for core to install deps (/opt/venv/.ready)...';
      until [ -f /opt/venv/.ready ]; do sleep 2; done;
      exec /opt/venv/bin/celery -A app.celery_app worker -Q steg -l info"

  analysis_worker:
    <<: *core
    container_name: veil-core-analysis-worker
    depends_on:
      - redis
      - core
    command: >
      bash -lc "echo 'waiting for core to install deps (/opt/venv/.ready)...';
      until [ -f /opt/venv/.ready ]; do sleep 2; done;
      exec /opt/venv/bin/celery -A app.celery_app worker -Q analysis -l info"

  redis:
    image: redis:7
    container_name: veil-core-redis
    # No host port: the stack reaches it as redis://redis:6379 on the compose
    # network, and a host mapping would clash with a local (brew) redis on 6379.
    # Debug from outside: docker exec -it veil-core-redis redis-cli
