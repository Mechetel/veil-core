<%
  require "dotenv"
  Dotenv.load("docker/secret-envs/docker-hub.env")
  Dotenv.load("docker/secret-envs/veil-core-production.env")
%>

# Name of your application. Used to uniquely configure containers.
service: veil-core

# Name of the container image.
image: mechetel/veil-core

# Deploy to these servers.
servers:
  # FastAPI (web role — the default image CMD: uvicorn).
  web:
    - XXX.XXX.XXX.XXX
  # Celery worker for the steganography queue (encode/decode, .steg models).
  steg_worker:
    hosts:
      - XXX.XXX.XXX.XXX
    cmd: celery -A app.celery_app worker -Q steg -l info
  # Celery worker for the steganalysis queue (analyze, .pt detectors).
  analysis_worker:
    hosts:
      - XXX.XXX.XXX.XXX
    cmd: celery -A app.celery_app worker -Q analysis -l info

# SSL + healthcheck for the FastAPI web role.
proxy:
  app_port: 8000
  healthcheck:
    path: /up
  # ssl: true
  # hosts:
  #   - veil-core.example.com

# Credentials for your image host.
registry:
  username: mechetel
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - VEIL_CORE_TOKEN
    - VEIL_CALLBACK_TOKEN
  clear:
    REDIS_URL: redis://veil-core-redis:6379/0
    WEB_CALLBACK_URL: https://veil-web.example.com
    WEIGHTS_DIR: /app/weights
    CUDA: "false"

# Aliases are triggered with "kamal <alias>".
aliases:
  logs: app logs -f
  shell: app exec --interactive --reuse "bash"

# Persistent weights volume (synced with scripts/sync_weights_to_server.sh).
# Survives image rebuilds / redeploys; weights are never baked into the image.
volumes:
  - "/srv/veil-core/weights:/app/weights"

# Redis broker/result backend for Celery.
accessories:
  redis:
    image: redis:7
    host: XXX.XXX.XXX.XXX
    directories:
      - data:/data

# Configure the image builder. For a GPU build pass TORCH_INDEX=cu121.
builder:
  arch: amd64
  dockerfile: docker/dockerfiles/prod.Dockerfile
  # args:
  #   TORCH_INDEX: cu121
